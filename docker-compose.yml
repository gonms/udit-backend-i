services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: clase_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - clase_network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: clase_nginx
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - clase_network
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: clase_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clase
      MYSQL_ROOT_PASSWORD: clase
      MYSQL_USER: clase
      MYSQL_PASSWORD: clase
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - clase_network

  redis:
    image: redis:7.2-alpine
    container_name: clase_redis
    restart: unless-stopped
    ports:
      - "6179:6379"
    volumes:
      - redis_data:/data
    networks:
      - clase_network
    command: redis-server --appendonly yes

networks:
  clase_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
